name: Compat (yt-dlp latest)

# Autonomy watchdog: weekly (and on demand) it installs the newest yt-dlp and our
# newest proxyhat SDK, then runs our tests against them. A red run means upstream
# shipped a breaking change to the proxy API — it opens/updates a tracking issue
# so we notice before users do. The proactive path is Renovate (renovate.json),
# which opens a version-bump PR that must pass this same CI before merging.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Install latest upstreams
        run: pip install --upgrade yt-dlp proxyhat
      - name: Check the yt-dlp proxy surface
        # Fails loudly if yt-dlp stopped honouring the `proxy` params key.
        run: |
          python - <<'PY'
          from yt_dlp import YoutubeDL
          ydl = YoutubeDL({"proxy": "http://127.0.0.1:9"}, auto_init=False)
          assert ydl.params.get("proxy") == "http://127.0.0.1:9", \
              "yt-dlp no longer accepts a `proxy` key in its params dict"
          # `proxies` is where YoutubeDL turns that key into its global proxy config.
          assert "127.0.0.1:9" in str(ydl.proxies), "yt-dlp changed how the `proxy` key is applied"
          print("yt-dlp proxy surface OK")
          PY
      - run: pytest -v
      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Compat break: yt-dlp@latest / proxyhat@latest";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "compat",
            });
            const body = `The weekly compatibility check failed against the latest upstream releases.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["compat"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            }
